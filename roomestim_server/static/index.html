<!DOCTYPE html>
<!--
  roomestim immersive-layout viewer (immersive-layout P5.2 / ADR 0061).

  Three.js r160 — MIT License (https://github.com/mrdoob/three.js). VENDORED under
  static/vendor/three/ (three.module.js + addons/controls/OrbitControls.js, pinned
  from npm three@0.160.0) and served locally via an ES-module importmap — NO build
  step (no npm / webpack / node_modules) and NO external CDN, so the viewer works
  offline / air-gapped (on-site AV installs) with no supply-chain fetch at load.

  D29: the browser performs ZERO physics. Every metric shown is read verbatim from
  the POST /api/evaluate response; the seed speaker positions are literal UI data.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>roomestim — immersive layout viewer</title>
  <style>
    :root {
      --bg: #14171c;
      --panel: #1e232b;
      --panel-2: #262c36;
      --line: #333b47;
      --fg: #e6e9ee;
      --muted: #9aa4b2;
      --accent: #5aa9e6;
      --warn: #e0b341;
      --err: #e06c6c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    #app { display: flex; flex-direction: column; height: 100%; }
    header {
      padding: 10px 16px; border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    #disclaimer {
      padding: 8px 16px; border-bottom: 1px solid var(--line);
      background: #23201a; color: var(--warn);
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    }
    #disclaimer.error { background: #2a1c1c; color: var(--err); }

    #main { display: flex; flex: 1; min-height: 0; }
    #scene { flex: 1; min-width: 0; position: relative; background: #0e1013; }
    #scene canvas { display: block; }

    #metrics {
      width: 340px; flex: none; overflow-y: auto;
      padding: 12px 16px; border-left: 1px solid var(--line);
      background: var(--panel);
    }
    #metrics h2 {
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      color: var(--muted); margin: 16px 0 6px; border-bottom: 1px solid var(--line);
      padding-bottom: 4px;
    }
    #metrics h2:first-child { margin-top: 0; }
    .metric { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
    .metric .k { color: var(--muted); }
    .metric .v { color: var(--fg); text-align: right; font-variant-numeric: tabular-nums; }
    .metric .v.bad { color: var(--err); }
    .metric .v.good { color: #7ac77a; }
    #status { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    #status.error { color: var(--err); }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "/static/vendor/three/three.module.js",
      "three/addons/": "/static/vendor/three/addons/"
  }}
  </script>
  <script type="module" src="/static/main.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>roomestim — immersive layout viewer</h1>
      <div class="sub">4-axis trade-off (level · panning · separation · cost + RT60) — relative guidance, not a measurement</div>
    </header>

    <div id="disclaimer">Loading…</div>

    <div id="main">
      <div id="scene"></div>
      <div id="metrics">
        <div id="status">Loading…</div>

        <h2>Level / SPL</h2>
        <div id="axis-spl"></div>

        <h2>Panning / Angular</h2>
        <div id="axis-angular"></div>

        <h2>Separation / Interference</h2>
        <div id="axis-interference"></div>

        <h2>Cost</h2>
        <div id="axis-cost"></div>

        <h2>RT60 context</h2>
        <div id="axis-rt60"></div>
      </div>
    </div>
  </div>
</body>
</html>
