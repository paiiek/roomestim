<!DOCTYPE html>
<!--
  roomestim immersive-layout viewer (immersive-layout P5.4 / ADR 0061).

  Three.js r160 — MIT License (https://github.com/mrdoob/three.js). VENDORED under
  static/vendor/three/ (three.module.js + addons/controls/OrbitControls.js, pinned
  from npm three@0.160.0) and served locally via an ES-module importmap — NO build
  step (no npm / webpack / node_modules) and NO external CDN, so the viewer works
  offline / air-gapped (on-site AV installs) with no supply-chain fetch at load.

  D29: the browser performs ZERO physics. Every metric shown is read verbatim from
  the POST /api/evaluate response; seed/re-seed layouts come verbatim from
  POST /api/place (core run_placement); the spec dropdown from GET /api/specs; and
  an uploaded room.yaml is parsed ENTIRELY server-side by core read_room_yaml
  (POST /api/rooms/upload). "Export trade-off JSON" downloads the exact report the
  server returned (no recompute). Dragging a speaker only moves its {x,z} (UI
  geometry) — no SPL/angle/RT60 math ever runs in the browser.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>roomestim — immersive layout viewer</title>
  <style>
    :root {
      --bg: #14171c;
      --panel: #1e232b;
      --panel-2: #262c36;
      --line: #333b47;
      --fg: #e6e9ee;
      --muted: #9aa4b2;
      --accent: #5aa9e6;
      --warn: #e0b341;
      --err: #e06c6c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    #app { display: flex; flex-direction: column; height: 100%; }
    header {
      padding: 10px 16px; border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    #disclaimer {
      padding: 8px 16px; border-bottom: 1px solid var(--line);
      background: #23201a; color: var(--warn);
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    }
    #disclaimer.error { background: #2a1c1c; color: var(--err); }

    #main { display: flex; flex: 1; min-height: 0; }
    #scene { flex: 1; min-width: 0; position: relative; background: #0e1013; }
    #scene canvas { display: block; }

    #metrics {
      width: 340px; flex: none; overflow-y: auto;
      padding: 12px 16px; border-left: 1px solid var(--line);
      background: var(--panel);
    }
    #metrics h2 {
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      color: var(--muted); margin: 16px 0 6px; border-bottom: 1px solid var(--line);
      padding-bottom: 4px;
    }
    #metrics h2:first-child { margin-top: 0; }
    .metric { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
    .metric .k { color: var(--muted); }
    .metric .v { color: var(--fg); text-align: right; font-variant-numeric: tabular-nums; }
    .metric .v.bad { color: var(--err); }
    .metric .v.good { color: #7ac77a; }
    #status { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    #status.error { color: var(--err); }

    #controls {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
    }
    #controls label { color: var(--muted); font-size: 12px; }
    #controls .note { color: var(--muted); font-size: 11px; font-style: italic; }
    #controls select, #controls input {
      background: var(--panel-2); color: var(--fg); border: 1px solid var(--line);
      border-radius: 4px; padding: 3px 6px; font-size: 12px;
    }
    #controls input#nspk { width: 56px; }
    #controls input#target, #controls input#drive, #controls input#rt60 { width: 72px; }
    #controls input#upload, #controls input#upload-roomplan,
    #controls input#upload-structure { max-width: 160px; }
    #controls button:disabled { opacity: .5; cursor: not-allowed; }
    #controls button {
      background: var(--accent); color: #0e1013; border: none; border-radius: 4px;
      padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    #controls button:hover { filter: brightness(1.1); }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "/static/vendor/three/three.module.js",
      "three/addons/": "/static/vendor/three/addons/"
  }}
  </script>
  <script type="module" src="/static/main.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>roomestim — immersive layout viewer</h1>
      <div class="sub">4-axis trade-off (level · panning · separation · cost + RT60) — relative guidance, not a measurement</div>
    </header>

    <div id="disclaimer">Loading…</div>

    <div id="main">
      <div id="scene"></div>
      <div id="metrics">
        <div id="controls">
          <label for="algo">algorithm</label>
          <select id="algo">
            <option value="vbap">vbap</option>
            <option value="dbap">dbap</option>
            <option value="coverage">coverage</option>
          </select>
          <label for="nspk">n</label>
          <input id="nspk" type="number" min="2" max="32" value="6" />
          <button id="reseed" type="button">Re-seed layout</button>

          <label for="spec">speaker</label>
          <select id="spec"><!-- populated from GET /api/specs on load --></select>

          <label for="target">target SPL (dB)</label>
          <input id="target" type="number" step="1" value="85" />
          <label for="drive">drive (W)</label>
          <input id="drive" type="number" step="0.5" min="0" value="10" />
          <label for="rt60">measured RT60 (s)</label>
          <input id="rt60" type="number" step="0.05" min="0" placeholder="predicted" />

          <label for="mat-floor">floor material</label>
          <select id="mat-floor"><!-- populated from GET /api/materials --></select>
          <label for="mat-walls">walls material</label>
          <select id="mat-walls"><!-- populated from GET /api/materials --></select>
          <label for="mat-ceiling">ceiling material</label>
          <select id="mat-ceiling"><!-- populated from GET /api/materials --></select>

          <label for="show-ceiling">천장 표시(Show ceiling)</label>
          <input id="show-ceiling" type="checkbox" checked />

          <label for="upload">upload room.yaml</label>
          <input id="upload" type="file" accept=".yaml,.yml" />
          <label for="upload-roomplan">RoomPlan JSON (.json)</label>
          <input id="upload-roomplan" type="file" accept=".json" />
          <label for="upload-structure">CapturedStructure (.json)</label>
          <input id="upload-structure" type="file" accept=".json" />
          <label for="upload-mesh">mesh (.obj/.gltf/.glb/.ply/.usdz)</label>
          <input id="upload-mesh" type="file" accept=".obj,.gltf,.glb,.ply,.usdz" />
          <span class="note" title="USD(.usdz) requires the [usd] extra (pxr) on the server">.usdz는 [usd] extra 필요</span>

          <label for="examples">예시 불러오기</label>
          <select id="examples"><!-- populated from GET /api/examples on load --></select>
          <span id="room-picker-wrap" style="display:none">
            <label for="room-picker">room</label>
            <select id="room-picker"><!-- populated for multi-room results --></select>
          </span>

          <button id="export" type="button" disabled>Export trade-off JSON</button>
          <button id="export-layout" type="button">Export layout.yaml</button>
        </div>

        <div id="status">Loading…</div>

        <h2>Level / SPL</h2>
        <div id="axis-spl"></div>

        <h2>Panning / Angular</h2>
        <div id="axis-angular"></div>

        <h2>Separation / Interference</h2>
        <div id="axis-interference"></div>

        <h2>Cost</h2>
        <div id="axis-cost"></div>

        <h2>RT60 context</h2>
        <div id="axis-rt60"></div>
      </div>
    </div>
  </div>
</body>
</html>
